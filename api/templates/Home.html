<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    {% load static %}
    <link href="{% static 'src/output.css' %}" rel="stylesheet" />
  </head>
  <body
    class="bg-gradient-to-b from-blue-100 to-blue-300 flex items-center justify-center h-screen"
  >
    <!-- NAVBAR -->
    <nav class="bg-white shadow-md fixed w-full z-10 top-0 left-0">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <!-- Logo -->
          <div class="flex-shrink-0 flex items-center">
            <div
              class="w-12 h-12 bg-gray-300 rounded-full flex items-center justify-center"
            >
              <!-- Aquí puedes poner tu imagen con <img> -->
              <span class="text-gray-600 font-bold">Logo</span>
            </div>
          </div>

          <!-- Links -->
          <div class="hidden md:flex space-x-6">
            <a
              href="#"
              class="text-gray-700 hover:text-blue-500 font-medium transition"
              >Inicio</a
            >
            <a
              href="#"
              class="text-gray-700 hover:text-blue-500 font-medium transition"
              >Servicios</a
            >
            <a
              href="#"
              class="text-gray-700 hover:text-blue-500 font-medium transition"
              >Inscripción</a
            >
            <a
              href="#"
              class="text-gray-700 hover:text-blue-500 font-medium transition"
              >Contacto</a
            >
          </div>

          <!-- Botón -->
          <div class="hidden md:flex">
            <a
              href="#"
              class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg shadow transition"
            >
              Reservar
            </a>
          </div>

          <!-- Menú móvil -->
          <div class="md:hidden flex items-center">
            <button
              id="mobile-menu-btn"
              class="text-gray-700 focus:outline-none"
            >
              <svg
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"
                />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Menú móvil desplegable -->
      <div id="mobile-menu" class="hidden md:hidden px-4 pb-4 space-y-2">
        <a href="#" class="block text-gray-700 hover:text-blue-500">Inicio</a>
        <a href="#" class="block text-gray-700 hover:text-blue-500"
          >Servicios</a
        >
        <a href="#" class="block text-gray-700 hover:text-blue-500"
          >Inscripción</a
        >
        <a href="#" class="block text-gray-700 hover:text-blue-500">Contacto</a>
        <a
          href="#"
          class="block bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg"
          >Reservar</a
        >
      </div>
    </nav>

    <script>
      document
        .getElementById("mobile-menu-btn")
        .addEventListener("click", () => {
          document.getElementById("mobile-menu").classList.toggle("hidden");
        });
    </script>

    <!-- Contenido de la página -->
    <div class="pt-20 flex flex-col items-center justify-center text-center">
      <h1 class="text-4xl font-bold text-blue-800">
        Bienvenido a Transporte Alegría
      </h1>
      <p class="mt-4 text-lg text-gray-700 max-w-2xl">
        Tu transporte confiable y seguro para llegar a donde necesites.
      </p>
    </div>
  </body>
</html>
